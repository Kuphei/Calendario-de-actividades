<!DOCTYPE html>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#fff5f9;padding:14px}
h1{text-align:center;font-size:21px;font-weight:800;color:#c2587a;margin-bottom:2px}
.subtitle{text-align:center;font-size:11px;color:#d48fa8;margin-bottom:10px}
.days-tabs{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.day-btn{padding:6px 13px;border-radius:20px;border:2px solid #f9c5d9;background:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:#c2587a;cursor:pointer;transition:all .2s}
.day-btn.active{background:#f9c5d9;color:#8b3054}
.day-btn:hover{background:#fde8f0}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:8px}
.prog-label{font-size:11px;color:#c2587a;font-weight:700;flex:1;text-align:center}
.reset-btn{padding:5px 12px;border-radius:20px;border:2px solid #f9c5d9;background:#fff;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:#c2587a;cursor:pointer;transition:all .2s;white-space:nowrap}
.reset-btn:hover{background:#fde8f0;border-color:#e879a0}
.reset-btn:active{transform:scale(0.96)}
.prog-wrap{background:#fde8f0;border-radius:20px;height:13px;margin:0 0 12px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,#f9a8cc,#e879a0);border-radius:20px;transition:width .4s ease}
.sec-header{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:12px;margin:8px 0 3px;font-size:12px;font-weight:800}
.task{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:13px;margin-bottom:3px;cursor:pointer;transition:all .18s;border:2px solid transparent}
.task:hover{transform:scale(1.01)}
.task.done .name{text-decoration:line-through;color:#bbb}
.chk{width:24px;height:24px;min-width:24px;border-radius:50%;border:2.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .22s;background:#fff}
.chk.on{background:currentColor}
.chk.on::after{content:'✓';color:#fff;font-size:12px;font-weight:800}
.hora{font-size:10px;font-weight:800;min-width:36px;text-align:right}
.name{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.float-el{position:fixed;pointer-events:none;font-size:26px;animation:fup 1.3s ease-out forwards;z-index:9999}
@keyframes fup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(1.5)}}
.footer{text-align:center;font-size:12px;color:#d48fa8;margin-top:12px;font-weight:700}
.paws-row{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:8px}
.s-man .sec-header{background:#fde8f0;color:#b5476d}
.s-man .task{background:#fff5f9}.s-man .task:hover{background:#fde8f0;border-color:#f9c5d9}
.s-man .chk{color:#e879a0;border-color:#f9a8cc}
.s-via .sec-header{background:#fff8e1;color:#b58a00}
.s-via .task{background:#fffde7}.s-via .task:hover{background:#fff3c0;border-color:#f9e0a0}
.s-via .chk{color:#f9b800;border-color:#f9d86e}
.s-tra .sec-header{background:#e8f5e9;color:#3a7d44}
.s-tra .task{background:#f1fbf2}.s-tra .task:hover{background:#dff2e1;border-color:#a5d9af}
.s-tra .chk{color:#4caf6a;border-color:#a5d9af}
.s-noc .sec-header{background:#ede7f6;color:#6a3fa0}
.s-noc .task{background:#f5f0fc}.s-noc .task:hover{background:#e9e0f8;border-color:#c9a8e8}
.s-noc .chk{color:#9c6fce;border-color:#c9a8e8}
.s-dor .sec-header{background:#fce4ec;color:#9c2d4e}
.s-dor .task{background:#fdf0f5}.s-dor .task:hover{background:#fde2ec;border-color:#f4afc8}
.s-dor .chk{color:#e87aa0;border-color:#f4afc8}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(255,220,235,0.7);z-index:999;align-items:center;justify-content:center}
.confirm-overlay.show{display:flex}
.confirm-box{background:#fff;border-radius:20px;border:2px solid #f9c5d9;padding:24px 28px;text-align:center;max-width:260px;box-shadow:0 4px 24px rgba(200,100,140,.15)}
.confirm-box p{font-size:13px;font-weight:700;color:#c2587a;margin-bottom:16px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-btns button{padding:7px 18px;border-radius:20px;border:2px solid #f9c5d9;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:all .2s}
.btn-yes{background:#e879a0;color:#fff;border-color:#e879a0}
.btn-yes:hover{background:#c2587a}
.btn-no{background:#fff;color:#c2587a}
.btn-no:hover{background:#fde8f0}
</style>

<!-- huellitas decorativas arriba -->
<div class="paws-row">
  <svg width="28" height="28" viewBox="0 0 40 40"><ellipse cx="20" cy="26" rx="12" ry="9" fill="#f9a8cc"/><ellipse cx="9" cy="14" rx="6" ry="7" fill="#f9a8cc"/><ellipse cx="20" cy="10" rx="6" ry="7" fill="#f9a8cc"/><ellipse cx="31" cy="14" rx="6" ry="7" fill="#f9a8cc"/></svg>
  <svg width="22" height="22" viewBox="0 0 40 40"><ellipse cx="20" cy="26" rx="12" ry="9" fill="#c9a8e8"/><ellipse cx="9" cy="14" rx="6" ry="7" fill="#c9a8e8"/><ellipse cx="20" cy="10" rx="6" ry="7" fill="#c9a8e8"/><ellipse cx="31" cy="14" rx="6" ry="7" fill="#c9a8e8"/></svg>
  <svg width="30" height="30" viewBox="0 0 40 40"><ellipse cx="20" cy="26" rx="12" ry="9" fill="#f9a8cc"/><ellipse cx="9" cy="14" rx="6" ry="7" fill="#f9a8cc"/><ellipse cx="20" cy="10" rx="6" ry="7" fill="#f9a8cc"/><ellipse cx="31" cy="14" rx="6" ry="7" fill="#f9a8cc"/></svg>
  <svg width="22" height="22" viewBox="0 0 40 40"><ellipse cx="20" cy="26" rx="12" ry="9" fill="#f9c88a"/><ellipse cx="9" cy="14" rx="6" ry="7" fill="#f9c88a"/><ellipse cx="20" cy="10" rx="6" ry="7" fill="#f9c88a"/><ellipse cx="31" cy="14" rx="6" ry="7" fill="#f9c88a"/></svg>
  <svg width="28" height="28" viewBox="0 0 40 40"><ellipse cx="20" cy="26" rx="12" ry="9" fill="#a5d9af"/><ellipse cx="9" cy="14" rx="6" ry="7" fill="#a5d9af"/><ellipse cx="20" cy="10" rx="6" ry="7" fill="#a5d9af"/><ellipse cx="31" cy="14" rx="6" ry="7" fill="#a5d9af"/></svg>
  <svg width="20" height="20" viewBox="0 0 40 40"><ellipse cx="20" cy="26" rx="12" ry="9" fill="#f9a8cc"/><ellipse cx="9" cy="14" rx="6" ry="7" fill="#f9a8cc"/><ellipse cx="20" cy="10" rx="6" ry="7" fill="#f9a8cc"/><ellipse cx="31" cy="14" rx="6" ry="7" fill="#f9a8cc"/></svg>
  <svg width="26" height="26" viewBox="0 0 40 40"><ellipse cx="20" cy="26" rx="12" ry="9" fill="#c9a8e8"/><ellipse cx="9" cy="14" rx="6" ry="7" fill="#c9a8e8"/><ellipse cx="20" cy="10" rx="6" ry="7" fill="#c9a8e8"/><ellipse cx="31" cy="14" rx="6" ry="7" fill="#c9a8e8"/></svg>
</div>

<h1>🐾 Mi Cronograma 🐾</h1>
<p class="subtitle">¡Haz clic para tachar tus tareas! Las huellas te aplaudirán 🌸</p>

<div class="days-tabs" id="tabs"></div>

<div class="top-bar">
  <div class="prog-label" id="plabel"></div>
  <button class="reset-btn" onclick="askReset()">🔄 Reiniciar día</button>
</div>
<div class="prog-wrap"><div class="prog-bar" id="pbar"></div></div>
<div id="list"></div>
<div class="footer" id="footer">🐾 ¡Tú puedes, campeona! 🐾</div>

<!-- Confirm modal -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p>🐾 ¿Segura que quieres reiniciar todas las tareas de hoy?</p>
    <div class="confirm-btns">
      <button class="btn-yes" onclick="doReset()">¡Sí, reiniciar!</button>
      <button class="btn-no" onclick="closeConfirm()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const DAYS=['Lunes','Martes','Miércoles','Jueves','Viernes'];
const SECS=[
  {cls:'s-man',icon:'🌸',lbl:'Mañana',items:[
    {h:'06:30',t:'Despertar ☀️'},{h:'06:35',t:'Fibra + Probiótico + B12 💊'},
    {h:'06:40',t:'Ducha 🚿'},{h:'07:00',t:'Skincare mañana 🧴✨'},
    {h:'07:15',t:'Vestirse 👗'},{h:'07:30',t:'Ordenar mochila 🎒'},
  ]},
  {cls:'s-via',icon:'🍋',lbl:'Viaje ida',items:[
    {h:'07:45',t:'Salida de casa 🚪'},{h:'07:45',t:'Viaje al trabajo 🚌'},{h:'08:30',t:'Llegada al trabajo'},
  ]},
  {cls:'s-tra',icon:'🌿',lbl:'Trabajo',items:[
    {h:'09:00',t:'Inicio jornada laboral 💼'},{h:'14:00',t:'Almuerzo + Berberina 💊'},
    {h:'17:45',t:'Colación 🍎'},{h:'18:30',t:'Magnesio + Citrato de potasio 💊'},
    {h:'18:30',t:'Fin jornada laboral'},{h:'19:30',t:'Gimnasio 💪'},{h:'20:45',t:'Fin gimnasio'},
  ]},
  {cls:'s-via',icon:'🏠',lbl:'Viaje vuelta',items:[
    {h:'20:45',t:'Viaje a casa 🚌'},
  ]},
  {cls:'s-noc',icon:'💜',lbl:'Noche',items:[
    {h:'21:30',t:'Llegada a casa 🏠'},{h:'21:30',t:'Lavar la loza (llegada) 🍽️'},
    {h:'21:45',t:'Once + Inositol 💊🍵'},{h:'22:00',t:'Ducha 🚿'},
    {h:'22:15',t:'Skincare noche 🧴🌙'},{h:'22:30',t:'Masaje / Relajación 💆'},
    {h:'22:40',t:'Caminata 30 min 🚶'},{h:'23:10',t:'Duolingo 10 min 🦉'},
    {h:'23:20',t:'Lectura Lezhin 15 min 📖💕'},{h:'23:35',t:'Empacar comida del día siguiente 🥗'},
    {h:'23:50',t:'Ordenar bolso 👜'},{h:'23:55',t:'Jugar Genshin Impact 🎮'},
    {h:'00:05',t:'Creatina 💊'},{h:'00:10',t:'Lavar la loza (noche) 🍽️'},
  ]},
  {cls:'s-dor',icon:'😴',lbl:'Dormir',items:[
    {h:'00:20',t:'Prepararse para dormir 🌙'},{h:'00:30',t:'DORMIR 😴  (6h → despertar 06:30)'},
  ]},
];
const TOTAL=SECS.reduce((s,sec)=>s+sec.items.length,0);
const FLOATS=['🐾','🌸','✨','💕','🌺','🥰','🎀','🌼','💖','💜'];
const MSGS=['🐾 ¡Tú puedes, campeona! 🐾','🌸 ¡Vas increíble! 🌸','✨ ¡Las huellas te admiran! ✨','💕 ¡Sigue así, princesa! 💕','🎀 ¡Casi terminas el día! 🎀','🥰 ¡Eres la mejor! 🥰','🌺 ¡100%! ¡Orgullosísimas! 🌺'];
const SK='mcronograma_v6';
let state={};
try{const r=localStorage.getItem(SK);if(r)state=JSON.parse(r);}catch(e){}
DAYS.forEach((_,d)=>{
  if(!state[d])state[d]={};
  SECS.forEach((sec,si)=>sec.items.forEach((_,ii)=>{const k=`${si}-${ii}`;if(state[d][k]===undefined)state[d][k]=false;}));
});
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
let cur=0;
const AC=new(window.AudioContext||window.webkitAudioContext)();
function playPop(){
  try{[880,1100,1320].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';o.frequency.setValueAtTime(f,AC.currentTime+i*0.07);g.gain.setValueAtTime(0.15,AC.currentTime+i*0.07);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.07+0.18);o.start(AC.currentTime+i*0.07);o.stop(AC.currentTime+i*0.07+0.2);});}catch(e){}
}
function playUncheck(){
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.setValueAtTime(500,AC.currentTime);o.frequency.exponentialRampToValueAtTime(320,AC.currentTime+0.15);g.gain.setValueAtTime(0.15,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.2);o.start();o.stop(AC.currentTime+0.2);}catch(e){}
}
function playReset(){
  try{[500,400,300].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';o.frequency.setValueAtTime(f,AC.currentTime+i*0.1);g.gain.setValueAtTime(0.12,AC.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.1+0.15);o.start(AC.currentTime+i*0.1);o.stop(AC.currentTime+i*0.1+0.18);});}catch(e){}
}
function doneCount(d){return Object.values(state[d]).filter(Boolean).length}
function spawnFloat(e){
  const el=document.createElement('div');el.className='float-el';
  el.textContent=FLOATS[Math.floor(Math.random()*FLOATS.length)];
  el.style.left=(e?e.clientX-13:window.innerWidth/2)+'px';
  el.style.top=(e?e.clientY-13:window.innerHeight/2)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1300);
}
function askReset(){
  AC.resume();
  document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('show');}
function doReset(){
  closeConfirm();playReset();
  SECS.forEach((sec,si)=>sec.items.forEach((_,ii)=>{state[cur][`${si}-${ii}`]=false;}));
  save();renderTasks();renderProgress();
}
function renderTabs(){
  document.getElementById('tabs').innerHTML=DAYS.map((d,i)=>
    `<button class="day-btn${i===cur?' active':''}" onclick="switchDay(${i})">${d}</button>`
  ).join('');
}
function renderProgress(){
  const n=doneCount(cur),pct=Math.round(n/TOTAL*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('plabel').textContent=`🐾 ${n} de ${TOTAL} tareas (${pct}%)`;
  document.getElementById('footer').textContent=MSGS[Math.min(Math.floor(pct/17),MSGS.length-1)];
}
function renderTasks(){
  document.getElementById('list').innerHTML=SECS.map((sec,si)=>`
    <div class="${sec.cls}">
      <div class="sec-header"><span style="font-size:15px">${sec.icon}</span>${sec.lbl}</div>
      ${sec.items.map((item,ii)=>{
        const k=`${si}-${ii}`,dn=state[cur][k];
        return `<div class="task${dn?' done':''}" onclick="toggle(${cur},'${k}',event)">
          <div class="chk${dn?' on':''}"></div>
          <span class="hora">${item.h}</span>
          <span class="name">${item.t}</span>
        </div>`;
      }).join('')}
    </div>`
  ).join('');
}
function toggle(d,k,e){
  AC.resume();const v=!state[d][k];state[d][k]=v;save();
  if(v){playPop();spawnFloat(e);}else{playUncheck();}
  renderTasks();renderProgress();
}
function switchDay(i){cur=i;renderTabs();renderTasks();renderProgress();}
switchDay(0);
</script>
